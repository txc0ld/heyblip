name = "blip-auth"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
FROM_EMAIL = "verify@blip.app"
CODE_TTL_SECONDS = "600"
MAX_SENDS_PER_HOUR = "3"
# Set to "true" only for local development to skip Resend and accept code 000000.
DEV_BYPASS = "true"

# Set RESEND_API_KEY via `wrangler secret put RESEND_API_KEY`
# Set DATABASE_URL via `wrangler secret put DATABASE_URL`

[[kv_namespaces]]
binding = "CODES"
id = "46bc2e8e8a2e4c5badea76ac27658a5e"
