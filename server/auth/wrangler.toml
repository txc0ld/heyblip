name = "blip-auth"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
FROM_EMAIL = "verify@heyblip.au"
CORS_ORIGIN = "https://heyblip.au,https://www.heyblip.au"
CODE_TTL_SECONDS = "600"
MAX_SENDS_PER_HOUR = "3"
JWT_EXPIRY_SECONDS = "3600"
JWT_REFRESH_GRACE_SECONDS = "300"
# SAFETY: Must remain "false" in production. When "true", skips Resend email
# verification and accepts code 000000. Only enable for local development.
DEV_BYPASS = "false"

# Set RESEND_API_KEY via `wrangler secret put RESEND_API_KEY`
# Set DATABASE_URL via `wrangler secret put DATABASE_URL`
# Set JWT_SECRET via `wrangler secret put JWT_SECRET`

# Cron trigger: ping every 5 minutes to keep Worker + Neon DB warm,
# avoiding cold-start timeouts on the first real user request.
[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "CODES"
id = "46bc2e8e8a2e4c5badea76ac27658a5e"
