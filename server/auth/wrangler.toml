name = "blip-auth"
main = "src/index.ts"
compatibility_date = "2025-03-01"
# @sentry/cloudflare imports node:async_hooks for context propagation across
# async boundaries; the Worker fails at runtime without nodejs_compat.
compatibility_flags = ["nodejs_compat"]

[vars]
FROM_EMAIL = "verify@heyblip.au"
CORS_ORIGIN = "https://heyblip.au,https://www.heyblip.au"
CODE_TTL_SECONDS = "600"
MAX_SENDS_PER_HOUR = "3"
JWT_EXPIRY_SECONDS = "3600"
JWT_REFRESH_GRACE_SECONDS = "300"

# Required secrets — set via `wrangler secret put <name>`:
#   RESEND_API_KEY       — transactional email (verification codes)
#   DATABASE_URL         — Neon Postgres connection string
#   JWT_SECRET           — HS256 signing key for session JWTs (must match blip-relay)
#   INTERNAL_API_KEY     — shared secret for /v1/internal/push (must match blip-relay)
#   APNS_KEY_ID          — Apple Push Notifications key ID
#   APNS_TEAM_ID         — Apple developer team ID
#   APNS_PRIVATE_KEY     — base64-encoded .p8 APNs auth key
#   APNS_ENVIRONMENT     — "production" for TestFlight/App Store, "development" for Xcode debug.
#                          MUST match the `aps-environment` entitlement in App/Entitlements/Blip.entitlements.
#                          Missing/mismatched = silent push failure (sandbox host rejects prod tokens).
#   APNS_BUNDLE_ID_PROD  — APNs topic for production builds (e.g. "au.heyblip.Blip"). Required — used when
#                          device_tokens.sandbox = FALSE.
#   APNS_BUNDLE_ID_DEBUG — APNs topic for debug builds (e.g. "au.heyblip.Blip.debug"). Required — used when
#                          device_tokens.sandbox = TRUE.
#   RELAY_INTERNAL_URL   — Optional. Base URL of the blip-relay worker; /v1/badge/clear forwards to
#                          `${RELAY_INTERNAL_URL}/internal/badge/clear`. Defaults to the production relay URL.
#   SENTRY_DSN           — Sentry project DSN for this Worker. Optional — when unset the
#                          `withSentry` wrapper boots in disabled mode (errors stay in
#                          `wrangler tail`). Set this in production so handlers below
#                          capture exceptions to the dashboard.

# Cron trigger: ping every 5 minutes to keep Worker + Neon DB warm,
# avoiding cold-start timeouts on the first real user request.
[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "CODES"
id = "46bc2e8e8a2e4c5badea76ac27658a5e"
