name = "blip-relay"
main = "src/index.ts"
compatibility_date = "2025-03-01"

# Set JWT_SECRET and INTERNAL_API_KEY via `wrangler secret put <name>`

[vars]
AUTH_PUSH_URL = "https://blip-auth.john-mckean.workers.dev/v1/internal/push"

[durable_objects]
bindings = [
  { name = "RELAY_ROOM", class_name = "RelayRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayRoom"]
