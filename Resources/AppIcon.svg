<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep purple to dark blue radial gradient background -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#6600FF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#4400CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0033;stop-opacity:1" />
    </radialGradient>

    <!-- Glow filter for signal lines -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Light gradient for chat bubbles -->
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E6E6FA;stop-opacity:0.90" />
    </linearGradient>
  </defs>

  <!-- Background with super-ellipse effect (rounded square) -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="url(#bgGradient)"/>

  <!-- Mesh network signal lines - radiating arcs -->
  <g filter="url(#glow)" opacity="0.4" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round">
    <!-- Concentric arcs from center outward -->
    <circle cx="512" cy="512" r="140" opacity="0.6"/>
    <circle cx="512" cy="512" r="220" opacity="0.4"/>
    <circle cx="512" cy="512" r="300" opacity="0.2"/>

    <!-- Radiating lines for mesh effect -->
    <line x1="512" y1="512" x2="512" y2="280" opacity="0.7"/>
    <line x1="512" y1="512" x2="693" y2="330" opacity="0.6"/>
    <line x1="512" y1="512" x2="744" y2="512" opacity="0.7"/>
    <line x1="512" y1="512" x2="693" y2="694" opacity="0.6"/>
    <line x1="512" y1="512" x2="512" y2="744" opacity="0.7"/>
    <line x1="512" y1="512" x2="330" y2="694" opacity="0.6"/>
    <line x1="512" y1="512" x2="280" y2="512" opacity="0.7"/>
    <line x1="512" y1="512" x2="330" y2="330" opacity="0.6"/>
  </g>

  <!-- Left chat bubble (primary) -->
  <g>
    <rect x="280" y="380" width="280" height="180" rx="48" ry="48" fill="url(#bubbleGradient)" stroke="#FFFFFF" stroke-width="3" opacity="0.9"/>

    <!-- Small dots inside bubble suggesting text -->
    <circle cx="320" cy="430" r="6" fill="#6600FF" opacity="0.6"/>
    <circle cx="345" cy="430" r="6" fill="#6600FF" opacity="0.5"/>
    <circle cx="370" cy="430" r="6" fill="#6600FF" opacity="0.4"/>

    <circle cx="320" cy="470" r="6" fill="#6600FF" opacity="0.5"/>
    <circle cx="345" cy="470" r="6" fill="#6600FF" opacity="0.4"/>
    <circle cx="370" cy="470" r="6" fill="#6600FF" opacity="0.3"/>

    <!-- Bubble tail (bottom left) -->
    <polygon points="280,560 260,600 300,570" fill="url(#bubbleGradient)" opacity="0.9" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Right chat bubble (secondary, overlapping) -->
  <g>
    <rect x="464" y="464" width="280" height="180" rx="48" ry="48" fill="url(#bubbleGradient)" stroke="#FFFFFF" stroke-width="3" opacity="0.85"/>

    <!-- Small dots inside bubble suggesting text -->
    <circle cx="504" cy="514" r="6" fill="#6600FF" opacity="0.5"/>
    <circle cx="529" cy="514" r="6" fill="#6600FF" opacity="0.4"/>
    <circle cx="554" cy="514" r="6" fill="#6600FF" opacity="0.3"/>

    <circle cx="504" cy="554" r="6" fill="#6600FF" opacity="0.4"/>
    <circle cx="529" cy="554" r="6" fill="#6600FF" opacity="0.3"/>

    <!-- Bubble tail (bottom right) -->
    <polygon points="744,644 764,684 704,654" fill="url(#bubbleGradient)" opacity="0.85" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Accent highlight: small pulse circle in upper right of right bubble -->
  <circle cx="700" cy="490" r="20" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <circle cx="700" cy="490" r="28" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>

  <!-- Central mesh node indicator (small glowing dot) -->
  <circle cx="512" cy="512" r="12" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="512" cy="512" r="18" fill="#FFFFFF" opacity="0.3"/>
</svg>
