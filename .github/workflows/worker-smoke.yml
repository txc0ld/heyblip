name: Worker smoke tests

# Post-deploy verification of the production Cloudflare Workers.
# Closes BDEV-400 — the failure mode behind BDEV-372 (INTERNAL_API_KEY rotation
# leaving BLIP-RELAY-2 firing for 12 minutes) is exactly what this catches.
#
# Triggers:
#   * push to main when server/** changes — workers are deployed manually today,
#     so this hits live infra a few minutes after a manual `wrangler deploy`.
#   * workflow_dispatch — re-run on demand after a manual deploy.
#   * schedule — every 30 minutes, so an outage between deploys still pages.
#
# A non-200 from any worker fails this workflow and notifies via the standard
# GitHub Actions failure channel (#blip-dev wired through GH integration).

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/worker-smoke.yml'
  workflow_dispatch:
  schedule:
    # Every 30 minutes; cron in UTC.
    - cron: '*/30 * * * *'

concurrency:
  group: worker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke-test blip-auth
        run: |
          set -euo pipefail
          echo "→ blip-auth /v1/auth/health"
          curl -fsS --max-time 10 \
            https://blip-auth.john-mckean.workers.dev/v1/auth/health \
            | tee /dev/stderr

      - name: Smoke-test blip-relay
        run: |
          set -euo pipefail
          echo "→ blip-relay /health"
          curl -fsS --max-time 10 \
            https://blip-relay.john-mckean.workers.dev/health \
            | tee /dev/stderr

      - name: Smoke-test blip-cdn
        run: |
          set -euo pipefail
          echo "→ blip-cdn /health"
          curl -fsS --max-time 10 \
            https://blip-cdn.john-mckean.workers.dev/health \
            | tee /dev/stderr

          echo "→ blip-cdn /manifests/events.json"
          status=$(curl -fsS --max-time 10 -o /tmp/events.json -w '%{http_code}' \
            https://blip-cdn.john-mckean.workers.dev/manifests/events.json)
          if [ "$status" != "200" ]; then
            echo "::error::events manifest returned HTTP $status"
            exit 1
          fi
          # Validate it parses as JSON; silent payload corruption shouldn't pass.
          jq -e . /tmp/events.json > /dev/null
          echo "events manifest OK (HTTP $status, $(wc -c < /tmp/events.json) bytes)"
