# Required GitHub Secrets:
# - DISTRIBUTION_CERTIFICATE_P12: Base64-encoded .p12 distribution certificate
# - DISTRIBUTION_CERTIFICATE_PASSWORD: Password for the .p12 file
# - PROVISIONING_PROFILE: Base64-encoded .mobileprovision for the main app (au.heyblip.Blip)
# - PROVISIONING_PROFILE_NSE: Base64-encoded .mobileprovision for the Notification Service Extension (au.heyblip.Blip.notifications)
# - ASC_KEY_ID: App Store Connect API Key ID
# - ASC_ISSUER_ID: App Store Connect Issuer ID
# - ASC_PRIVATE_KEY: App Store Connect API private key (.p8 content)

name: Deploy to TestFlight

on:
  push:
    tags:
      - 'alpha-*'
      - 'beta-*'
      - 'v*'
  workflow_dispatch:
    inputs:
      build_note:
        description: TestFlight build note
        required: false
        default: Alpha build

concurrency:
  group: deploy-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      XCODE_SCHEME: Blip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set derived paths
        run: |
          echo "ARCHIVE_PATH=$RUNNER_TEMP/Blip.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/export" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db" >> "$GITHUB_ENV"
          echo "CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12" >> "$GITHUB_ENV"
          echo "PROFILE_MAIN_PATH=$RUNNER_TEMP/build_pp_main.mobileprovision" >> "$GITHUB_ENV"
          echo "PROFILE_NSE_PATH=$RUNNER_TEMP/build_pp_nse.mobileprovision" >> "$GITHUB_ENV"
          echo "PROFILE_MAIN_PLIST_PATH=$RUNNER_TEMP/build_pp_main.plist" >> "$GITHUB_ENV"
          echo "PROFILE_NSE_PLIST_PATH=$RUNNER_TEMP/build_pp_nse.plist" >> "$GITHUB_ENV"

      - name: Select Xcode & install iOS platform
        # Pick the latest STABLE Xcode 26 (filter out beta). When macos-26 runner images
        # include `Xcode_26.5_beta_*.app`, a greedy `sort -V | tail -1` grabs the beta —
        # whose iOS SDK isn't pre-installed on the runner, breaking `xcodebuild archive`
        # with `iOS X.Y is not installed`. Filtering to GA-only avoids the trap.
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -v -i beta | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No stable Xcode 26 installation found on the runner"
            echo "Available Xcode installs:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || true
            exit 1
          fi

          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -downloadPlatform iOS || true

      - name: Validate required secrets
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
          PROVISIONING_PROFILE_NSE: ${{ secrets.PROVISIONING_PROFILE_NSE }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for secret_name in \
            DISTRIBUTION_CERTIFICATE_P12 \
            DISTRIBUTION_CERTIFICATE_PASSWORD \
            PROVISIONING_PROFILE \
            PROVISIONING_PROFILE_NSE \
            ASC_KEY_ID \
            ASC_ISSUER_ID \
            ASC_PRIVATE_KEY
          do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Parse version from tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract version and build from tag: alpha-1.0.0-3 → 1.0.0 / 3
          if [[ "$TAG" =~ ^(alpha|beta|v)-?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            echo "APP_VERSION=${BASH_REMATCH[2]}" >> "$GITHUB_ENV"
            echo "APP_BUILD=${BASH_REMATCH[3]}" >> "$GITHUB_ENV"
          elif [[ "$TAG" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "APP_VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
            echo "APP_BUILD=${{ github.run_number }}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=1.0.0" >> "$GITHUB_ENV"
            echo "APP_BUILD=${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Record build note
        run: |
          note="${{ github.event.inputs.build_note || 'Alpha build' }}"
          {
            echo "## TestFlight deployment"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Version: $APP_VERSION ($APP_BUILD)"
            echo "- Note: $note"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: |
          set -euo pipefail
          brew install xcodegen libsodium
          xcodegen generate

      - name: Import signing certificate
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo -n "$DISTRIBUTION_CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import provisioning profiles
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
          PROVISIONING_PROFILE_NSE: ${{ secrets.PROVISIONING_PROFILE_NSE }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          install_profile() {
            local b64="$1"
            local profile_path="$2"
            local plist_path="$3"
            local var_name="$4"

            echo -n "$b64" | base64 --decode -o "$profile_path"
            security cms -D -i "$profile_path" > "$plist_path"
            local uuid
            uuid=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$plist_path")
            local name
            name=$(/usr/libexec/PlistBuddy -c 'Print Name' "$plist_path")
            cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
            printf '%s=%s\n' "$var_name" "$name" >> "$GITHUB_ENV"
          }

          install_profile "$PROVISIONING_PROFILE"     "$PROFILE_MAIN_PATH" "$PROFILE_MAIN_PLIST_PATH" "PROVISIONING_PROFILE_NAME"
          install_profile "$PROVISIONING_PROFILE_NSE" "$PROFILE_NSE_PATH"  "$PROFILE_NSE_PLIST_PATH"  "PROVISIONING_PROFILE_NSE_NAME"

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          app_store_connect_dir="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$app_store_connect_dir"
          key_path="$app_store_connect_dir/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"

      - name: Archive
        # Use the project's native Automatic signing (set in project.yml). Manual mode
        # via the CLI would require per-target PROVISIONING_PROFILE_SPECIFIER overrides
        # for the main app + NSE, which xcodebuild doesn't expose per-target. With both
        # profiles pre-installed in ~/Library/MobileDevice/Provisioning Profiles/, plus
        # -allowProvisioningUpdates and the ASC API key configured below, Xcode resolves
        # each target's profile by bundle ID match. Manual signing is still used at
        # export time via ExportOptions.plist for explicit per-bundle profile mapping.
        run: |
          set -euo pipefail
          xcodebuild archive \
            -scheme "$XCODE_SCHEME" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD" \
            OTHER_SWIFT_FLAGS='$(inherited) -Xfrontend -strict-concurrency=minimal' \
            -quiet

      - name: Export and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Cleanup signing material
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERTIFICATE_PATH" \
                "$PROFILE_MAIN_PATH" "$PROFILE_MAIN_PLIST_PATH" \
                "$PROFILE_NSE_PATH"  "$PROFILE_NSE_PLIST_PATH" || true
          rm -rf "$HOME/.appstoreconnect" || true
