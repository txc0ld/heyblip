# Required GitHub Secrets:
# - DISTRIBUTION_CERTIFICATE_P12: Base64-encoded .p12 distribution certificate
# - DISTRIBUTION_CERTIFICATE_PASSWORD: Password for the .p12 file
# - PROVISIONING_PROFILE: Base64-encoded .mobileprovision file
# - ASC_KEY_ID: App Store Connect API Key ID
# - ASC_ISSUER_ID: App Store Connect Issuer ID
# - ASC_PRIVATE_KEY: App Store Connect API private key (.p8 content)

name: Deploy to TestFlight

on:
  push:
    tags:
      - 'alpha-*'
      - 'beta-*'
      - 'v*'
  workflow_dispatch:
    inputs:
      build_note:
        description: TestFlight build note
        required: false
        default: Alpha build

concurrency:
  group: deploy-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      XCODE_SCHEME: Blip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set derived paths
        run: |
          echo "ARCHIVE_PATH=$RUNNER_TEMP/Blip.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/export" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db" >> "$GITHUB_ENV"
          echo "CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12" >> "$GITHUB_ENV"
          echo "PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision" >> "$GITHUB_ENV"
          echo "PROFILE_PLIST_PATH=$RUNNER_TEMP/build_pp.plist" >> "$GITHUB_ENV"

      - name: Select Xcode & install iOS platform
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 16 installation found on the runner"
            exit 1
          fi

          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -downloadPlatform iOS || true

      - name: Validate required secrets
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for secret_name in \
            DISTRIBUTION_CERTIFICATE_P12 \
            DISTRIBUTION_CERTIFICATE_PASSWORD \
            PROVISIONING_PROFILE \
            ASC_KEY_ID \
            ASC_ISSUER_ID \
            ASC_PRIVATE_KEY
          do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Record build note
        run: |
          note="${{ github.event.inputs.build_note || 'Alpha build' }}"
          {
            echo "## TestFlight deployment"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Note: $note"
            echo "- Commit: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: |
          set -euo pipefail
          brew install xcodegen libsodium
          xcodegen generate

      - name: Import signing certificate
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo -n "$DISTRIBUTION_CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"

          profile_uuid=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST_PATH")
          profile_name=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST_PATH")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
          echo "PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          app_store_connect_dir="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$app_store_connect_dir"
          key_path="$app_store_connect_dir/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -scheme "$XCODE_SCHEME" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            OTHER_SWIFT_FLAGS='$(inherited) -Xfrontend -strict-concurrency=minimal' \
            -quiet

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            -quiet

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          ipa_path=$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)
          if [ -z "$ipa_path" ]; then
            echo "::error::No IPA produced in $EXPORT_PATH"
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Cleanup signing material
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERTIFICATE_PATH" "$PROFILE_PATH" "$PROFILE_PLIST_PATH" || true
          rm -rf "$HOME/.appstoreconnect" || true
