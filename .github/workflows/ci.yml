name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-15

    steps:
      - name: Select Xcode & install iOS platform
        run: |
          # Use the latest Xcode 16.x on the runner
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          # Install iOS platform if not already present
          xcodebuild -downloadPlatform iOS || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen libsodium

      - name: Cache Swift package dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('Packages/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test BlipProtocol
        run: swift test --package-path Packages/BlipProtocol

      - name: Test BlipCrypto
        run: swift test --package-path Packages/BlipCrypto

      - name: Test BlipMesh
        run: |
          for attempt in 1 2; do
            if swift test --package-path Packages/BlipMesh; then
              exit 0
            fi

            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi

            echo "BlipMesh tests failed on attempt $attempt, retrying once..."
            sleep 5
          done

      - name: Build app
        # SWIFT_STRICT_CONCURRENCY is set to `complete` in project.yml; do NOT
        # override to `minimal` here — CI must match local builds so concurrency
        # bugs that fail your local build also fail CI (BDEV-398).
        run: >
          xcodebuild -scheme Blip
          -destination 'generic/platform=iOS'
          -skipPackagePluginValidation
          CODE_SIGN_IDENTITY=""
          CODE_SIGNING_ALLOWED=NO
          -quiet

      - name: Test app (Blip scheme — BlipTests target)
        # Runs the app-level test suite (Tests/ServiceTests, Tests/ViewModelTests,
        # Tests/SwiftDataSchemaValidationTests, Tests/CryptoTests, Tests/MeshTests,
        # Tests/ProtocolTests). These depend on the Blip app target and cannot run
        # via `swift test`; previously they ran only locally via Xcode. (BDEV-399)
        run: >
          xcodebuild test
          -scheme Blip
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
          -skipPackagePluginValidation
          CODE_SIGN_IDENTITY=""
          CODE_SIGNING_ALLOWED=NO
          -quiet

  server-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and test auth worker
        working-directory: server/auth
        run: |
          npm ci
          npm test

      - name: Install and test cdn worker
        working-directory: server/cdn
        run: |
          npm ci
          npm test
