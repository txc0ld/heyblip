name: Blip
options:
  bundleIdPrefix: au.heyblip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "23"
    DEVELOPMENT_TEAM: "3WM8QNMY94"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  BlipProtocol:
    path: Packages/BlipProtocol
  BlipMesh:
    path: Packages/BlipMesh
  BlipCrypto:
    path: Packages/BlipCrypto
  swift-opus:
    url: https://github.com/alta/swift-opus
    revision: 6f3cb6bd3ffed1fe5f06d00a962d5c191a50daf8
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

targets:
  Blip:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/*.entitlements"
          - "PrivacyInfo.xcprivacy"
      - path: App/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.heyblip.Blip
        CODE_SIGN_ENTITLEMENTS: App/Entitlements/Blip.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: App/Info.plist  # UIBackgroundModes includes remote-notification — see App/Info.plist
        BLIP_AUTH_BASE_URL: https://blip-auth.john-mckean.workers.dev/v1
        BLIP_RELAY_BASE_URL: https://blip-relay.john-mckean.workers.dev
        BLIP_CDN_BASE_URL: https://blip-cdn.john-mckean.workers.dev
        SENTRY_DSN: https://981fc5cd21b47caa50c86a0084f6680b@o4511222169337856.ingest.us.sentry.io/4511222171303936
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SUPPORTS_MACCATALYST: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          OTHER_SWIFT_FLAGS: "-DBLE_UUID_DEBUG"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          SWIFT_OPTIMIZATION_LEVEL: -O
    postBuildScripts:
      - name: Embed Git Info
        script: |
          cd "${SRCROOT}"
          GIT_HASH=$(git rev-parse --short=7 HEAD 2>/dev/null || echo "unknown")
          GIT_BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo "detached")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PLIST="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :GitCommitHash string $GIT_HASH" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GitCommitHash $GIT_HASH" "$PLIST"
            /usr/libexec/PlistBuddy -c "Add :GitBranch string $GIT_BRANCH" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GitBranch $GIT_BRANCH" "$PLIST"
            /usr/libexec/PlistBuddy -c "Add :BuildDate string $BUILD_DATE" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :BuildDate $BUILD_DATE" "$PLIST"
          fi
        basedOnDependencyAnalysis: false
    dependencies:
      - package: BlipProtocol
      - package: BlipMesh
      - package: BlipCrypto
      - package: swift-opus
        product: Opus
      - package: Sentry
    entitlements:
      path: App/Entitlements/Blip.entitlements
      properties:
        aps-environment: production
        keychain-access-groups:
          - "$(AppIdentifierPrefix)au.heyblip.Blip"

  BlipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Blip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.heyblip.BlipTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Blip:
    build:
      targets:
        Blip: all
        BlipTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Blip.storekit
      environmentVariables:
        - variable: BLE_SERVICE_UUID
          value: "FC000001-0000-1000-8000-00805F9B34FA"
          isEnabled: true
    test:
      config: Debug
      targets:
        - BlipTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Blip-Release:
    build:
      targets:
        Blip: all
    run:
      config: Release
      environmentVariables:
        - variable: BLE_SERVICE_UUID
          value: "FC000001-0000-1000-8000-00805F9B34FB"
          isEnabled: true
    profile:
      config: Release
    archive:
      config: Release
