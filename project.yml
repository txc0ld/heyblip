name: Blip
options:
  bundleIdPrefix: au.heyblip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  BlipProtocol:
    path: Packages/BlipProtocol
  BlipMesh:
    path: Packages/BlipMesh
  BlipCrypto:
    path: Packages/BlipCrypto

targets:
  Blip:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/*.entitlements"
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.heyblip.Blip
        CODE_SIGN_ENTITLEMENTS: App/Entitlements/Blip.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SUPPORTS_MACCATALYST: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          OTHER_SWIFT_FLAGS: "-DBLE_UUID_DEBUG"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies:
      - package: BlipProtocol
      - package: BlipMesh
      - package: BlipCrypto
    entitlements:
      path: App/Entitlements/Blip.entitlements

  BlipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Blip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.heyblip.BlipTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Blip:
    build:
      targets:
        Blip: all
        BlipTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Blip.storekit
      environmentVariables:
        - variable: BLE_SERVICE_UUID
          value: "FC000001-0000-1000-8000-00805F9B34FA"
          isEnabled: true
    test:
      config: Debug
      targets:
        - BlipTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Blip-Release:
    build:
      targets:
        Blip: all
    run:
      config: Release
      environmentVariables:
        - variable: BLE_SERVICE_UUID
          value: "FC000001-0000-1000-8000-00805F9B34FB"
          isEnabled: true
    profile:
      config: Release
    archive:
      config: Release
